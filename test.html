<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree Growth and Rain Animation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <canvas id="treeCanvas"></canvas>
    <div id="particles-js"></div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
    (function() {
        var canvas = document.getElementById('treeCanvas');
        var ctx = canvas.getContext('2d');

        // Set canvas size to window size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        var trees = [];
        var growth_rate = 2;
        var maximum_bend = 90 / 180 * Math.PI;
        var smallest_branch = 30;

        function init() {
            // Plant 3 trees
            for (var i = 0; i < 5; i++) {
                plant_new_tree();
            }
            requestAnimationFrame(loop);

            // Initialize rain particles
            particlesJS('particles-js', rainParticlesConfig);
        }

        function plant_new_tree() {
            var magnitude = 100,
                thickness = 8,
                theta = 0,
                origin = {
                    x: Math.random() * canvas.width,
                    y: canvas.height - 40
                };

            var newTree = [create_branch(origin, magnitude, thickness, theta, 0)];
            newTree[0].tree = newTree;  // Associate the branch with its tree
            trees.push(newTree);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function update() {
            trees.forEach(tree => tree.forEach(grow_branch));
        }

        function draw() {
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            trees.forEach(tree => {
                tree.forEach(function(branch) {
                    var w = branch.thickness;
                    var oX1 = branch.origin.x - w;
                    var oX2 = branch.origin.x + w;
                    var oY = branch.origin.y;
                    var tX1 = branch.tip.x - w * 0.8;
                    var tX2 = branch.tip.x + w * 0.8;
                    var tY = branch.tip.y;
                    var cpX1 = (oX1 + oX1 + tX1) / 3;
                    var cpY1 = (oY + tY + tY) / 3;
                    var cpX2 = (oX2 + oX2 + tX2) / 3;
                    var cpY2 = (oY + tY + tY) / 3;
                    ctx.beginPath();
                    ctx.moveTo(oX1, oY);
                    ctx.quadraticCurveTo(cpX1, cpY1, tX1, tY);
                    ctx.lineTo(tX2, tY);
                    ctx.quadraticCurveTo(cpX2, cpY2, oX2, oY);
                    ctx.fillStyle = 'black';
                    ctx.fill();
                });
            });
        }

        function grow_branch(branch) {
            if (branch.done) return;

            var x = (branch.tip.x - branch.origin.x);
            var y = (branch.tip.y - branch.origin.y);
            var h = Math.sqrt(Math.pow(x, 2) + Math.pow(y, 2));

            if (h >= branch.magnitude) {
                branch.done = true;

                if (branch.magnitude < smallest_branch) return;
                shoot(branch);

                return;
            }

            branch.tip.x = branch.tip.x + (Math.sin(branch.theta) * growth_rate);
            branch.tip.y = branch.tip.y - (Math.cos(branch.theta) * growth_rate);
        }

        function shoot(branch) {
            if (branch.sprouts <= 0) return;
            branch.sprouts -= 1;

            var theta2 = branch.theta + (Math.random() * maximum_bend - maximum_bend / 2);
            var magnitude2 = branch.magnitude * (Math.random() * 0.2 + 0.7);
            var lightness2 = branch.lightness * 0.9;

            var newBranch = create_branch({
                x: branch.tip.x,
                y: branch.tip.y
            }, magnitude2, branch.thickness * 0.6, theta2, lightness2);
            
            newBranch.tree = branch.tree;  // Associate the new branch with the same tree
            branch.tree.push(newBranch);

            shoot(branch);
        }

        function create_branch(origin, magnitude, thickness, theta, lightness) {
            return {
                origin: origin,
                thickness: thickness,
                theta: theta,
                magnitude: magnitude,
                tip: {
                    x: origin.x,
                    y: origin.y
                },
                lightness: lightness,
                sprouts: ((Math.random() * 4) + 1) >>> 0
            };
        }

        // Rain particles configuration
        const rainParticlesConfig = {
            particles: {
                number: { value: 200, density: { enable: true, value_area: 800 } },
                color: { value: "#000000" },  // Changed to black for visibility on white background
                shape: { type: "circle" },
                opacity: { value: 0.7, random: false },
                size: { value: 3, random: true, anim: { enable: false } },
                line_linked: { enable: false },
                move: {
                    enable: true,
                    speed: 10,
                    direction: "bottom",
                    random: true,
                    straight: true,
                    out_mode: "out",
                    bounce: false
                }
            },
            interactivity: {
                detect_on: "canvas",
                events: {
                    onhover: { enable: false },
                    onclick: { enable: false },
                    resize: true
                }
            },
            retina_detect: true
        };

        // Start the animation when the window loads
        window.onload = init;

        // Resize canvas when window is resized
        window.onresize = function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particlesJS('particles-js', rainParticlesConfig);
        };
    })();
    </script>
</body>
</html>
