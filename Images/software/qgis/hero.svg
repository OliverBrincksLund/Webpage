<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">QGIS workflow overview</title>
  <desc id="desc">Diagram showing a QGIS-based workflow with data inputs, automated styling, map layouts, and batch exports.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f141d"/>
      <stop offset="55%" stop-color="#151d29"/>
      <stop offset="100%" stop-color="#0a0e15"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c49040"/>
      <stop offset="100%" stop-color="#38a898"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="102" y="98" width="1396" height="704" rx="28" fill="#111823" stroke="#283245" stroke-width="2"/>
  <rect x="150" y="144" width="1300" height="62" rx="14" fill="#171f2b"/>
  <rect x="188" y="170" width="250" height="12" rx="6" fill="#384355"/>
  <rect x="472" y="170" width="136" height="12" rx="6" fill="#2f394d"/>

  <rect x="160" y="248" width="286" height="484" rx="22" fill="#141d29" stroke="#2d394d" stroke-width="2"/>
  <rect x="496" y="248" width="610" height="484" rx="22" fill="#141d29" stroke="#2d394d" stroke-width="2"/>
  <rect x="1156" y="248" width="294" height="484" rx="22" fill="#141d29" stroke="#2d394d" stroke-width="2"/>

  <rect x="548" y="302" width="238" height="308" rx="18" fill="#182233" stroke="#314056" stroke-width="2"/>
  <rect x="816" y="302" width="238" height="308" rx="18" fill="#182233" stroke="#314056" stroke-width="2"/>

  <path d="M246 324h52c46 0 84 38 84 84v68c0 46 38 84 84 84h42" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M786 458h30c34 0 62-28 62-62v-4" fill="none" stroke="#38a898" stroke-width="6" stroke-linecap="round"/>
  <path d="M936 610h48c54 0 98-44 98-98v-44" fill="none" stroke="#c49040" stroke-width="6" stroke-linecap="round"/>

  <g fill="#2b3549">
    <rect x="198" y="314" width="184" height="16" rx="8"/>
    <rect x="198" y="356" width="150" height="12" rx="6"/>
    <rect x="198" y="388" width="170" height="12" rx="6"/>
    <rect x="198" y="420" width="126" height="12" rx="6"/>
    <rect x="1196" y="316" width="180" height="14" rx="7"/>
    <rect x="1196" y="356" width="146" height="12" rx="6"/>
    <rect x="1196" y="388" width="162" height="12" rx="6"/>
    <rect x="1196" y="420" width="134" height="12" rx="6"/>
  </g>

  <g fill="#e7e2da" font-family="Segoe UI, Arial, sans-serif">
    <text x="190" y="292" font-size="24" font-weight="700">Inputs</text>
    <text x="190" y="474" font-size="18" fill="#96a2b2">Spatial layers, tables,</text>
    <text x="190" y="502" font-size="18" fill="#96a2b2">project parameters, symbology</text>

    <text x="578" y="336" font-size="24" font-weight="700">Processing and Styling</text>
    <text x="578" y="372" font-size="18" fill="#96a2b2">PyQGIS automation for filtering,</text>
    <text x="578" y="400" font-size="18" fill="#96a2b2">layer setup, categories, and labels</text>

    <text x="846" y="336" font-size="24" font-weight="700">Layouts and Maps</text>
    <text x="846" y="372" font-size="18" fill="#96a2b2">Programmatic map composition,</text>
    <text x="846" y="400" font-size="18" fill="#96a2b2">legends, scale bars, and extents</text>

    <text x="1188" y="292" font-size="24" font-weight="700">Outputs</text>
    <text x="1188" y="474" font-size="18" fill="#96a2b2">Batch-exported figures,</text>
    <text x="1188" y="502" font-size="18" fill="#96a2b2">project maps, and report assets</text>
  </g>

  <text x="150" y="844" fill="#e7e2da" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700">QGIS Program</text>
  <text x="150" y="882" fill="#8f9bab" font-family="Consolas, monospace" font-size="22">Custom PyQGIS tooling for repeatable geospatial workflows, map layouts, and automated export.</text>
</svg>
